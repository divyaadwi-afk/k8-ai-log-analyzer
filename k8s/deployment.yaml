apiVersion: apps/v1
kind: Deployment

metadata:
  name: log-generator

spec:
  replicas: 2

  selector:
    matchLabels:
      app: log-generator

  template:
    metadata:
      labels:
        labels[app]: YOUR_VALUE

    spec:
      containers:
        drop[0]: YOUR_VALUE
          image: log-generator:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"